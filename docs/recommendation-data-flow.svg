<svg width="1680" height="980" viewBox="0 0 1680 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1680" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8FE"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5042E1"/>
      <stop offset="1" stop-color="#68FDFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5042E1" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#5A60A8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #161616; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #5E648F; }
      .panel-title { font: 700 20px Arial, sans-serif; fill: #161616; }
      .panel-subtitle { font: 400 14px Arial, sans-serif; fill: #5E648F; }
      .node-title { font: 700 17px Arial, sans-serif; fill: #161616; }
      .node-text { font: 400 13px Arial, sans-serif; fill: #4E557D; }
      .tiny { font: 600 12px Arial, sans-serif; fill: #5042E1; }
    </style>
  </defs>

  <rect width="1680" height="980" rx="32" fill="url(#bg)"/>

  <text x="80" y="72" class="title">Recommendation Pipeline and Databases</text>
  <text x="80" y="102" class="subtitle">Текущий поток данных для подбора кружков: Telegram-бот, runtime-база и зеркало PFDO</text>

  <rect x="60" y="150" width="520" height="770" rx="28" fill="#FFFFFF" stroke="#E1E4F6" filter="url(#shadow)"/>
  <text x="92" y="198" class="panel-title">1. Telegram bot runtime</text>
  <text x="92" y="224" class="panel-subtitle">Сбор профиля, LLM routing, confidence и выдача рекомендаций</text>

  <rect x="90" y="260" width="215" height="88" rx="20" fill="#F2F4FE" stroke="#D3D4F3"/>
  <text x="112" y="294" class="node-title">Пользователь в Telegram</text>
  <text x="112" y="320" class="node-text">/start, кнопки,</text>
  <text x="112" y="338" class="node-text">свободный текст запроса</text>

  <rect x="332" y="260" width="215" height="88" rx="20" fill="#F2F4FE" stroke="#D3D4F3"/>
  <text x="354" y="294" class="node-title">Webhook / index.js</text>
  <text x="354" y="320" class="node-text">Обработка сообщений,</text>
  <text x="354" y="338" class="node-text">переходы по шагам</text>

  <rect x="90" y="404" width="215" height="116" rx="20" fill="#FBFBFF" stroke="#D3D4F3"/>
  <text x="112" y="438" class="node-title">LLM router</text>
  <text x="112" y="464" class="node-text">Qwen 2.5 3B</text>
  <text x="112" y="482" class="node-text">разбирает свободный</text>
  <text x="112" y="500" class="node-text">текст в сценарий и слоты</text>

  <rect x="332" y="404" width="215" height="116" rx="20" fill="#FBFBFF" stroke="#D3D4F3"/>
  <text x="354" y="438" class="node-title">Session state</text>
  <text x="354" y="464" class="node-text">age, interests, budget,</text>
  <text x="354" y="482" class="node-text">schedule, goal,</text>
  <text x="354" y="500" class="node-text">clarifyGroup, clarifyFocus</text>

  <rect x="90" y="574" width="457" height="126" rx="20" fill="#F8F9FF" stroke="#D3D4F3"/>
  <text x="112" y="608" class="node-title">Recommendations engine</text>
  <text x="112" y="634" class="node-text">computeConfidence - scoreLiveProgram - chooseBestGroup</text>
  <text x="112" y="652" class="node-text">Учитывает возраст, интересы, avoidances, goal, adaptation,</text>
  <text x="112" y="670" class="node-text">локацию, бюджет, расписание, свободные места, возраст группы</text>

  <rect x="90" y="752" width="215" height="118" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="112" y="786" class="node-title">bot_sessions</text>
  <text x="112" y="812" class="node-text">Текущий payload сессии</text>
  <text x="112" y="830" class="node-text">по chat_id</text>

  <rect x="332" y="752" width="215" height="118" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="354" y="786" class="node-title">recommendation_history</text>
  <text x="354" y="812" class="node-text">История выдачи:</text>
  <text x="354" y="830" class="node-text">source, confidence, payload</text>

  <rect x="640" y="150" width="420" height="770" rx="28" fill="#FFFFFF" stroke="#E1E4F6" filter="url(#shadow)"/>
  <text x="672" y="198" class="panel-title">2. PFDO mirror lookup</text>
  <text x="672" y="224" class="panel-subtitle">Локальный поиск по каталогу и деталям программ</text>

  <rect x="670" y="276" width="360" height="106" rx="20" fill="#F2F4FE" stroke="#D3D4F3"/>
  <text x="694" y="310" class="node-title">pfdo-mirror.js</text>
  <text x="694" y="336" class="node-text">getMunicipalities - searchPrograms - getProgramDetail</text>
  <text x="694" y="354" class="node-text">checkMirrorHealth</text>

  <rect x="670" y="436" width="360" height="132" rx="20" fill="#FBFBFF" stroke="#D3D4F3"/>
  <text x="694" y="470" class="node-title">Первичный shortlist</text>
  <text x="694" y="496" class="node-text">1. matchMunicipality(location)</text>
  <text x="694" y="514" class="node-text">2. searchPrograms(municipalityId)</text>
  <text x="694" y="532" class="node-text">3. scoreLiveProgram по карточке программы</text>
  <text x="694" y="550" class="node-text">4. загрузка detail_payload по top-кандидатам</text>

  <rect x="670" y="622" width="360" height="180" rx="20" fill="#F8F9FF" stroke="#D3D4F3"/>
  <text x="694" y="656" class="node-title">Нормализация результата</text>
  <text x="694" y="682" class="node-text">normalizeLiveProgram()</text>
  <text x="694" y="700" class="node-text">- лучшая open group по бюджету и расписанию</text>
  <text x="694" y="718" class="node-text">- schedule, price, free places из bestGroup</text>
  <text x="694" y="736" class="node-text">- summary, note, sourceUrl, programTextUrl</text>
  <text x="694" y="754" class="node-text">- final score = programScore + groupScore</text>

  <rect x="1120" y="150" width="500" height="770" rx="28" fill="#FFFFFF" stroke="#E1E4F6" filter="url(#shadow)"/>
  <text x="1152" y="198" class="panel-title">3. PFDO mirror database</text>
  <text x="1152" y="224" class="panel-subtitle">Ключевые сущности, на которых держится рекомендация</text>

  <rect x="1150" y="266" width="212" height="116" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="1172" y="300" class="node-title">pfdo_main_municipalities</text>
  <text x="1172" y="326" class="node-text">Муниципалитеты</text>
  <text x="1172" y="344" class="node-text">для фильтрации поиска</text>

  <rect x="1390" y="266" width="200" height="116" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="1412" y="300" class="node-title">pfdo_directions</text>
  <text x="1412" y="326" class="node-text">Официальная</text>
  <text x="1412" y="344" class="node-text">направленность</text>

  <rect x="1150" y="428" width="440" height="144" rx="20" fill="#F2F4FE" stroke="#D3D4F3"/>
  <text x="1172" y="462" class="node-title">pfdo_programs</text>
  <text x="1172" y="488" class="node-text">Ядро каталога: возраст, направление, organization_name,</text>
  <text x="1172" y="506" class="node-text">search_payload, detail_payload, annotation, task, source_url</text>
  <text x="1172" y="532" class="tiny">Используется для первичного score и карточки программы</text>

  <rect x="1150" y="624" width="212" height="136" rx="20" fill="#FBFBFF" stroke="#D3D4F3"/>
  <text x="1172" y="658" class="node-title">pfdo_program_groups</text>
  <text x="1172" y="684" class="node-text">Цена группы,</text>
  <text x="1172" y="702" class="node-text">возраст группы,</text>
  <text x="1172" y="720" class="node-text">свободные места</text>

  <rect x="1390" y="624" width="200" height="136" rx="20" fill="#FBFBFF" stroke="#D3D4F3"/>
  <text x="1412" y="658" class="node-title">pfdo_program_group_periods</text>
  <text x="1412" y="684" class="node-text">Периоды набора</text>
  <text x="1412" y="702" class="node-text">и связка с</text>
  <text x="1412" y="720" class="node-text">расписанием</text>

  <rect x="1150" y="804" width="212" height="92" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="1172" y="838" class="node-title">pfdo_group_schedule_entries</text>
  <text x="1172" y="864" class="node-text">Дни недели и время</text>

  <rect x="1390" y="804" width="200" height="92" rx="20" fill="#FFFFFF" stroke="#D3D4F3"/>
  <text x="1412" y="838" class="node-title">pfdo_program_activities</text>
  <text x="1412" y="864" class="node-text">Сырые activity</text>

  <path d="M305 304H332" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M198 348V404" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M440 348V404" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M198 520V574" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M440 520V574" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M198 700V752" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M440 700V752" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M547 637H670" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1030 329H1120" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1030 502H1120" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1030 712H1120" stroke="#5A60A8" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1256 382V428" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1490 382V428" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1256 572V624" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1490 572V624" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1256 760V804" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1490 760V804" stroke="#7F87C3" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="82" y="120" width="182" height="18" rx="9" fill="url(#accent)" opacity="0.18"/>
  <rect x="662" y="120" width="182" height="18" rx="9" fill="url(#accent)" opacity="0.18"/>
  <rect x="1142" y="120" width="182" height="18" rx="9" fill="url(#accent)" opacity="0.18"/>
</svg>
