# Reverse proxy для бота: публичный HTTPS -> локальный listener 127.0.0.1:3000
# Файл кладётся в /etc/nginx/sites-available/traektoria51-bot и линкуется в sites-enabled.
#
# Порядок:
#  1) Сначала поднять этот server на :80 (без ssl-блока), получить сертификат:
#       sudo certbot --nginx -d bot.traektoria51.ru
#     certbot сам допишет listen 443 ssl и пути к сертификатам.
#  2) После этого блок будет выглядеть примерно так, как ниже.

server {
    listen 80;
    server_name bot.traektoria51.ru;

    # certbot подставит редирект на https автоматически.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Telegram/MAX шлют небольшие JSON-апдейты — таймауты можно держать скромными
        proxy_read_timeout 30s;
    }
}

