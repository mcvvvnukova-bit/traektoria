name: Deploy landing to Beget

# Авто-деплой статического лендинга: при push в main с изменениями в landing/
# GitHub по SSH заходит на сервер и публикует landing/ в веб-рут nginx.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
  workflow_dispatch: {}   # ручной запуск из вкладки Actions

concurrency:
  group: deploy-prod      # общий с деплоем бота — чтобы не пересекаться на git-чекауте
  cancel-in-progress: false

jobs:
  deploy-landing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.BEGET_SSH_PORT || 22 }}" -H "${{ secrets.BEGET_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/id_deploy \
              -p "${{ secrets.BEGET_SSH_PORT || 22 }}" \
              "${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}" \
              'bash -s' < deploy/remote-deploy-landing.sh
